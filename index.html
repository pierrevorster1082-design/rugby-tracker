<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vorster Rugby Pro</title>
    
    <!-- 1. Tailwind for Design -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. React Core (Must be first) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 3. Helpers required by Recharts -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    
    <!-- 4. Visualization Libraries -->
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide-react"></script>
    
    <!-- 5. Babel for the Logic -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            background-color: #f8fafc;
            color: #0f172a;
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.5);
        }

        .premium-card {
            background: white;
            border: 1px solid rgba(241, 245, 249, 1);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.02), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .stat-glow-liam { box-shadow: 0 20px 30px -10px rgba(16, 185, 129, 0.2); }
        .stat-glow-divan { box-shadow: 0 20px 30px -10px rgba(59, 130, 246, 0.2); }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        .animate-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, Fragment } = React;

        function App() {
            // Safety Check for Libraries
            const Libs = {
                Recharts: window.Recharts || {},
                Lucide: window.LucideReact || window.lucide || {}
            };

            const { 
                LayoutDashboard, PlusCircle, History, Trophy, Target, 
                TrendingUp, Calendar, MapPin, XCircle, BarChart3, 
                ShieldCheck, Plus, Trash2, Medal, Pencil, ChevronRight, Users 
            } = Libs.Lucide;

            const [activeSon, setActiveSon] = useState('liam');
            const [view, setView] = useState('dashboard');
            const [matches, setMatches] = useState([]);
            const [editingMatch, setEditingMatch] = useState(null);

            useEffect(() => {
                const saved = localStorage.getItem('vorster_rugby_v12_final');
                if (saved) setMatches(JSON.parse(saved));
            }, []);

            useEffect(() => {
                localStorage.setItem('vorster_rugby_v12_final', JSON.stringify(matches));
            }, [matches]);

            const SONS = {
                LIAM: { id: 'liam', name: 'Liam', team: 'MagaliesKruin 1st Team', color: '#10b981', glow: 'stat-glow-liam' },
                DIVAN: { id: 'divan', name: 'Divan', team: 'Die Poort U/10', color: '#3b82f6', glow: 'stat-glow-divan' }
            };

            const TRY_POINTS = 5;
            const CONVERSION_POINTS = 2;
            const PENALTY_POINTS = 3;

            const calculatePoints = (tries, convs, pens) => 
                (parseInt(tries || 0) * TRY_POINTS) + (parseInt(convs || 0) * CONVERSION_POINTS) + (parseInt(pens || 0) * PENALTY_POINTS);

            const getSuccessRate = (made, att) => att === 0 ? 0 : Math.round((made / att) * 100);

            const activeSonData = SONS[activeSon.toUpperCase()];
            const filteredMatches = useMemo(() => 
                matches.filter(m => m.sonId === activeSon).sort((a, b) => new Date(b.date) - new Date(a.date))
            , [matches, activeSon]);

            const stats = useMemo(() => {
                if (filteredMatches.length === 0) return null;
                const wins = filteredMatches.filter(m => parseInt(m.scoreUs) > parseInt(m.scoreThem)).length;
                const losses = filteredMatches.filter(m => parseInt(m.scoreUs) < parseInt(m.scoreThem)).length;
                const draws = filteredMatches.filter(m => parseInt(m.scoreUs) === parseInt(m.scoreThem)).length;
                
                const sonTries = filteredMatches.reduce((acc, m) => acc + (parseInt(m.sonTries) || 0), 0);
                const totalConvAtt = filteredMatches.reduce((acc, m) => acc + (parseInt(m.sonConvAtt) || 0), 0);
                const totalConvSucc = filteredMatches.reduce((acc, m) => acc + (parseInt(m.sonConvSucc) || 0), 0);
                
                const sonPoints = calculatePoints(sonTries, totalConvSucc, 0);

                const teamScorers = {};
                teamScorers[activeSonData.name] = { tries: sonTries, points: sonPoints };
                filteredMatches.forEach(m => {
                    (m.otherScorers || []).forEach(s => {
                        if (!teamScorers[s.name]) teamScorers[s.name] = { tries: 0, points: 0 };
                        teamScorers[s.name].tries += (parseInt(s.tries) || 0);
                        teamScorers[s.name].points += calculatePoints(s.tries, 0, 0);
                    });
                });

                return {
                    totalGames: filteredMatches.length, wins, losses, draws, sonPoints, sonTries,
                    overallRate: getSuccessRate(totalConvSucc, totalConvAtt),
                    winRate: ((wins / filteredMatches.length) * 100).toFixed(0),
                    leaderboard: Object.entries(teamScorers).map(([n, d]) => ({ name: n, ...d })).sort((a, b) => b.points - a.points)
                };
            }, [filteredMatches, activeSonData.name]);

            const handleSave = (data) => {
                if (data.id) {
                    setMatches(matches.map(m => m.id === data.id ? data : m));
                } else {
                    setMatches([{ ...data, id: Date.now(), sonId: activeSon }, ...matches]);
                }
                setEditingMatch(null);
                setView('dashboard');
            };

            return (
                <div className="min-h-screen pb-36">
                    {/* Header */}
                    <header className="sticky top-0 z-50 px-6 py-6 bg-slate-50/90 backdrop-blur-xl border-b border-slate-200/20">
                        <div className="max-w-xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <div className={`w-14 h-14 rounded-2xl flex items-center justify-center text-white font-black text-2xl shadow-lg transform transition-all ${activeSonData.glow}`} 
                                     style={{ backgroundColor: activeSonData.color }}>
                                    {activeSonData.name[0]}
                                </div>
                                <div>
                                    <h1 className="font-black text-xl tracking-tight text-slate-900">{activeSonData.name}</h1>
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">{activeSonData.team}</p>
                                </div>
                            </div>
                            <div className="flex bg-white/60 p-1.5 rounded-2xl border border-white shadow-sm">
                                {Object.values(SONS).map(son => (
                                    <button key={son.id} onClick={() => { setActiveSon(son.id); setView('dashboard'); }} 
                                            className={`px-5 py-2 rounded-xl text-xs font-black transition-all ${activeSon === son.id ? 'bg-white shadow-sm text-slate-900' : 'text-slate-400'}`}>
                                        {son.name}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-xl mx-auto px-6 animate-in">
                        {view === 'dashboard' ? (
                            <div className="space-y-8">
                                {!stats ? (
                                    <div className="py-24 text-center">
                                        <div className="w-20 h-20 bg-white rounded-full shadow-inner flex items-center justify-center mx-auto mb-6 border border-slate-100">
                                            <Trophy size={32} className="text-slate-200"/>
                                        </div>
                                        <p className="text-slate-400 font-bold italic">Nog geen wedstryde nie...</p>
                                    </div>
                                ) : (
                                    <Fragment>
                                        <div className="grid grid-cols-2 gap-5">
                                            <div className={`p-7 rounded-[2.25rem] transition-all bg-slate-900 text-white shadow-2xl`}>
                                                <div className="flex justify-between items-start mb-6">
                                                    <div className="p-2.5 rounded-xl bg-white/10 text-white"><Target size={20}/></div>
                                                    <span className="text-[10px] font-black uppercase tracking-[0.2em] text-white/40">Punte</span>
                                                </div>
                                                <p className="text-4xl font-black leading-none tracking-tighter mb-1.5">{stats.sonPoints}</p>
                                                <p className="text-[10px] font-bold uppercase text-white/60">{stats.sonTries} Drieë</p>
                                            </div>
                                            <div className="p-7 rounded-[2.25rem] bg-white border border-white shadow-sm">
                                                <div className="flex justify-between items-start mb-6">
                                                    <div className="p-2.5 rounded-xl bg-slate-50 text-slate-400"><TrendingUp size={20}/></div>
                                                    <span className="text-[10px] font-black uppercase tracking-[0.2em] text-slate-300">Wenne</span>
                                                </div>
                                                <p className="text-4xl font-black leading-none tracking-tighter mb-1.5">{stats.winRate}%</p>
                                                <p className="text-[10px] font-bold uppercase text-slate-400">{stats.wins} Gewen</p>
                                            </div>
                                            <div className="p-7 rounded-[2.25rem] bg-white border border-white shadow-sm">
                                                <div className="flex justify-between items-start mb-6">
                                                    <div className="p-2.5 rounded-xl bg-slate-50 text-slate-400"><ShieldCheck size={20}/></div>
                                                    <span className="text-[10px] font-black uppercase tracking-[0.2em] text-slate-300">Skoppe</span>
                                                </div>
                                                <p className="text-4xl font-black leading-none tracking-tighter mb-1.5">{stats.overallRate}%</p>
                                                <p className="text-[10px] font-bold uppercase text-slate-400">Akkuraatheid</p>
                                            </div>
                                            <div className="p-7 rounded-[2.25rem] bg-white border border-white shadow-sm">
                                                <div className="flex justify-between items-start mb-6">
                                                    <div className="p-2.5 rounded-xl bg-slate-50 text-slate-400"><History size={20}/></div>
                                                    <span className="text-[10px] font-black uppercase tracking-[0.2em] text-slate-300">Rekord</span>
                                                </div>
                                                <p className="text-4xl font-black leading-none tracking-tighter mb-1.5">{stats.wins}-{stats.draws}-{stats.losses}</p>
                                                <p className="text-[10px] font-bold uppercase text-slate-400">W-G-V</p>
                                            </div>
                                        </div>

                                        <div className="premium-card p-8 rounded-[2.5rem] bg-white border-white">
                                            <h3 className="text-[11px] font-black text-slate-400 uppercase tracking-[0.3em] mb-8">Ranglys</h3>
                                            <div className="space-y-4">
                                                {stats.leaderboard.map((s, i) => (
                                                    <div key={s.name} className={`flex items-center justify-between p-5 rounded-[1.5rem] ${s.name === activeSonData.name ? 'bg-slate-900 text-white shadow-xl scale-[1.03]' : 'bg-slate-50'}`}>
                                                        <div className="flex items-center gap-4">
                                                            <span className={`w-8 h-8 rounded-full flex items-center justify-center text-[10px] font-black ${s.name === activeSonData.name ? 'bg-white/20 text-white' : 'bg-white text-slate-300'}`}>{i + 1}</span>
                                                            <span className="font-bold text-sm">{s.name}</span>
                                                        </div>
                                                        <span className="font-black text-sm">{s.points} pts</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </Fragment>
                                )}
                            </div>
                        ) : view === 'history' ? (
                            <div className="space-y-6">
                                <h2 className="text-2xl font-black italic text-slate-800 px-2">Wedstryd Log</h2>
                                {filteredMatches.map(m => (
                                    <div key={m.id} className="premium-card p-6 rounded-[2.25rem] flex items-center justify-between">
                                        <div className="flex items-center gap-5">
                                            <div className={`w-14 h-14 rounded-2xl flex flex-col items-center justify-center font-black ${parseInt(m.scoreUs) > parseInt(m.scoreThem) ? 'bg-emerald-50 text-emerald-600' : 'bg-slate-100 text-slate-400'}`}>
                                                <span className="text-xl">{parseInt(m.scoreUs) > parseInt(m.scoreThem) ? 'W' : 'V'}</span>
                                            </div>
                                            <div>
                                                <h4 className="font-black text-slate-900 text-lg leading-tight">vs {m.opponent}</h4>
                                                <p className="text-[10px] text-slate-400 font-bold uppercase">{m.date}</p>
                                            </div>
                                        </div>
                                        <p className="text-3xl font-black tracking-tighter">{m.scoreUs} - {m.scoreThem}</p>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <AddForm onSave={handleSave} onCancel={() => setView('dashboard')} color={activeSonData.color} sonName={activeSonData.name} />
                        )}
                    </main>

                    <nav className="fixed bottom-8 left-8 right-8 h-20 glass-nav rounded-[2.5rem] shadow-2xl flex justify-around items-center z-50 px-8 border border-white/50">
                        <button onClick={() => setView('dashboard')} className={`flex flex-col items-center gap-1.5 ${view === 'dashboard' ? 'text-slate-900' : 'text-slate-300'}`}>
                            <LayoutDashboard size={24} /><span className="text-[9px] font-black uppercase">Stats</span>
                        </button>
                        <button onClick={() => setView('add')} className="w-16 h-16 -mt-16 bg-slate-900 text-white rounded-[1.75rem] shadow-2xl flex items-center justify-center transform transition-all active:scale-90 hover:scale-110">
                            <Plus size={36} strokeWidth={3} />
                        </button>
                        <button onClick={() => setView('history')} className={`flex flex-col items-center gap-1.5 ${view === 'history' ? 'text-slate-900' : 'text-slate-300'}`}>
                            <History size={24} /><span className="text-[9px] font-black uppercase">Logs</span>
                        </button>
                    </nav>
                </div>
            );
        }

        function AddForm({ onSave, onCancel, color, sonName }) {
            const [f, setF] = useState({ date: new Date().toISOString().split('T')[0], opponent: '', scoreUs: 0, scoreThem: 0, sonTries: 0, sonConvAtt: 0, sonConvSucc: 0, otherScorers: [] });
            return (
                <div className="bg-white rounded-[3rem] shadow-2xl p-10 space-y-10 animate-in border border-slate-50">
                    <div className="flex justify-between items-center">
                        <h2 className="text-3xl font-black italic tracking-tighter text-slate-800">Nuwe Verslag</h2>
                        <button onClick={onCancel} className="bg-slate-50 p-2.5 rounded-full text-slate-300"><XCircle size={30}/></button>
                    </div>
                    <div className="space-y-6">
                        <input placeholder="Teenstander" className="w-full bg-slate-50 rounded-2xl p-5 font-bold outline-none border-2 border-slate-50 focus:border-slate-100 transition-all text-lg shadow-inner" value={f.opponent} onChange={e => setF({...f, opponent: e.target.value})} />
                        <div className="grid grid-cols-2 gap-6 p-10 bg-slate-900 rounded-[2.75rem] shadow-2xl">
                            <div className="text-center"><label className="text-[10px] font-black text-white/40 uppercase mb-3 block">Ons</label><input type="number" className="w-full bg-transparent text-white text-center text-5xl font-black outline-none border-none tracking-tighter" value={f.scoreUs} onChange={e => setF({...f, scoreUs: e.target.value})} /></div>
                            <div className="text-center"><label className="text-[10px] font-black text-white/40 uppercase mb-3 block">Hulle</label><input type="number" className="w-full bg-transparent text-white/30 text-center text-5xl font-black outline-none border-none tracking-tighter" value={f.scoreThem} onChange={e => setF({...f, scoreThem: e.target.value})} /></div>
                        </div>
                        <div className="p-8 bg-slate-50 rounded-[2.5rem] space-y-6 border border-slate-100 shadow-inner">
                            <h3 className="text-[11px] font-black text-slate-900 uppercase tracking-[0.2em]">{sonName} se Bydrae</h3>
                            <div className="grid grid-cols-1 gap-4">
                                <div className="bg-white p-5 rounded-[1.75rem] text-center shadow-sm flex items-center justify-between">
                                    <label className="text-[9px] font-black text-slate-400 uppercase">Drieë</label>
                                    <input type="number" className="w-16 text-center font-black text-3xl outline-none" value={f.sonTries} onChange={e => setF({...f, sonTries: e.target.value})} />
                                </div>
                                <div className="bg-white p-5 rounded-[1.75rem] text-center shadow-sm">
                                    <label className="text-[9px] font-black text-slate-400 block mb-4 uppercase">Skoppe (Slaag / Pogings)</label>
                                    <div className="flex items-center gap-3 justify-center">
                                        <input type="number" className="w-16 text-center font-black text-3xl outline-none" value={f.sonConvSucc} onChange={e => setF({...f, sonConvSucc: e.target.value})} />
                                        <span className="text-slate-200 text-3xl font-light">/</span>
                                        <input type="number" className="w-16 text-center font-black text-3xl outline-none" value={f.sonConvAtt} onChange={e => setF({...f, sonConvAtt: e.target.value})} />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <button onClick={() => onSave(f)} className="w-full py-6 rounded-[2rem] text-white font-black text-2xl shadow-xl hover:brightness-110 active:scale-95 transition-all" style={{ backgroundColor: color }}>Bevestig Verslag</button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
