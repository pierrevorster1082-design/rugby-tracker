<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vorster Rugby Pro</title>
    <!-- Premium UI Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            background-color: #f8fafc;
            color: #0f172a;
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.5);
        }

        .premium-card {
            background: white;
            border: 1px solid rgba(241, 245, 249, 1);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.02), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .premium-card:active {
            transform: scale(0.98);
        }

        .stat-glow-liam {
            box-shadow: 0 20px 25px -5px rgba(16, 185, 129, 0.12), 0 10px 10px -5px rgba(16, 185, 129, 0.04);
        }

        .stat-glow-divan {
            box-shadow: 0 20px 25px -5px rgba(59, 130, 246, 0.12), 0 10px 10px -5px rgba(59, 130, 246, 0.04);
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        .animate-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Smooth page transitions */
        .page-transition-enter { opacity: 0; transform: scale(0.98); }
        .page-transition-enter-active { opacity: 1; transform: scale(1); transition: all 300ms ease-out; }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { 
            LayoutDashboard, PlusCircle, History, Trophy, Target, 
            TrendingUp, Calendar, MapPin, XCircle, BarChart3, 
            ShieldCheck, Plus, Trash2, Medal, Pencil, ChevronRight,
            Search, Users, Activity
        } = lucide;
        const { 
            LineChart, Line, BarChart, Bar, XAxis, YAxis, 
            CartesianGrid, Tooltip, ResponsiveContainer, 
            PieChart, Pie, Cell, Legend 
        } = Recharts;

        const SONS = {
            LIAM: { id: 'liam', name: 'Liam', team: 'MagaliesKruin 1st Team', color: '#10b981', glow: 'stat-glow-liam' },
            DIVAN: { id: 'divan', name: 'Divan', team: 'Die Poort U/10', color: '#3b82f6', glow: 'stat-glow-divan' }
        };

        const TRY_POINTS = 5;
        const CONVERSION_POINTS = 2;
        const PENALTY_POINTS = 3;

        const calculatePoints = (tries, convs, pens) => 
            (parseInt(tries || 0) * TRY_POINTS) + (parseInt(convs || 0) * CONVERSION_POINTS) + (parseInt(pens || 0) * PENALTY_POINTS);

        const getSuccessRate = (made, att) => att === 0 ? 0 : Math.round((made / att) * 100);

        function App() {
            const [activeSon, setActiveSon] = useState('liam');
            const [view, setView] = useState('dashboard');
            const [matches, setMatches] = useState([]);
            const [editingMatch, setEditingMatch] = useState(null);

            // Using unique key for final fresh start
            useEffect(() => {
                const saved = localStorage.getItem('vorster_rugby_pro_final');
                if (saved) setMatches(JSON.parse(saved));
            }, []);

            useEffect(() => {
                localStorage.setItem('vorster_rugby_pro_final', JSON.stringify(matches));
            }, [matches]);

            const activeSonData = SONS[activeSon.toUpperCase()];
            const filteredMatches = useMemo(() => 
                matches.filter(m => m.sonId === activeSon).sort((a, b) => new Date(b.date) - new Date(a.date))
            , [matches, activeSon]);

            const stats = useMemo(() => {
                if (filteredMatches.length === 0) return null;
                const wins = filteredMatches.filter(m => m.scoreUs > m.scoreThem).length;
                const losses = filteredMatches.filter(m => m.scoreUs < m.scoreThem).length;
                const draws = filteredMatches.filter(m => m.scoreUs === m.scoreThem).length;
                
                const sonTries = filteredMatches.reduce((acc, m) => acc + (parseInt(m.sonTries) || 0), 0);
                const totalConvAtt = filteredMatches.reduce((acc, m) => acc + (parseInt(m.sonConvAtt) || 0), 0);
                const totalConvSucc = filteredMatches.reduce((acc, m) => acc + (parseInt(m.sonConvSucc) || 0), 0);
                const totalPenAtt = filteredMatches.reduce((acc, m) => acc + (parseInt(m.sonPenAtt) || 0), 0);
                const totalPenSucc = filteredMatches.reduce((acc, m) => acc + (parseInt(m.sonPenSucc) || 0), 0);
                
                const sonPoints = calculatePoints(sonTries, totalConvSucc, totalPenSucc);

                const teamScorers = {};
                teamScorers[activeSonData.name] = { tries: sonTries, points: sonPoints };
                filteredMatches.forEach(m => {
                    (m.otherScorers || []).forEach(s => {
                        if (!teamScorers[s.name]) teamScorers[s.name] = { tries: 0, points: 0 };
                        teamScorers[s.name].tries += (parseInt(s.tries) || 0);
                        teamScorers[s.name].points += calculatePoints(s.tries, s.convs, s.pens);
                    });
                });

                return {
                    totalGames: filteredMatches.length, wins, losses, draws, sonPoints, sonTries,
                    overallRate: getSuccessRate(totalConvSucc + totalPenSucc, totalConvAtt + totalPenAtt),
                    winRate: ((wins / filteredMatches.length) * 100).toFixed(0),
                    leaderboard: Object.entries(teamScorers).map(([n, d]) => ({ name: n, ...d })).sort((a, b) => b.points - a.points)
                };
            }, [filteredMatches, activeSonData.name]);

            const handleSave = (data) => {
                if (data.id) {
                    setMatches(matches.map(m => m.id === data.id ? data : m));
                } else {
                    setMatches([{ ...data, id: Date.now(), sonId: activeSon }, ...matches]);
                }
                setEditingMatch(null);
                setView('dashboard');
            };

            const handleDelete = (id) => {
                if (confirm("Is jy seker jy wil hierdie wedstryd uitvee?")) {
                    setMatches(matches.filter(m => m.id !== id));
                }
            };

            return (
                <div className="min-h-screen pb-36">
                    {/* Premium Header */}
                    <header className="sticky top-0 z-50 px-6 py-6 bg-slate-50/80 backdrop-blur-xl border-b border-white/20">
                        <div className="max-w-xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <div className={`w-14 h-14 rounded-2xl flex items-center justify-center text-white font-black text-2xl shadow-xl transform transition-all hover:scale-105 ${activeSonData.glow}`} 
                                     style={{ backgroundColor: activeSonData.color }}>
                                    {activeSonData.name[0]}
                                </div>
                                <div>
                                    <h1 className="font-black text-xl tracking-tight leading-none mb-1 text-slate-900">{activeSonData.name}</h1>
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">{activeSonData.team}</p>
                                </div>
                            </div>
                            <div className="flex bg-white/60 p-1 rounded-2xl border border-white shadow-sm">
                                {Object.values(SONS).map(son => (
                                    <button key={son.id} onClick={() => { setActiveSon(son.id); setView('dashboard'); }} 
                                            className={`px-5 py-2 rounded-xl text-xs font-black transition-all duration-300 ${activeSon === son.id ? 'bg-white shadow-sm text-slate-900 scale-105' : 'text-slate-400 hover:text-slate-600'}`}>
                                        {son.name}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-xl mx-auto px-6 animate-in">
                        {view === 'dashboard' ? (
                            <div className="space-y-8">
                                {!stats ? (
                                    <div className="py-24 text-center">
                                        <div className="w-24 h-24 bg-white rounded-[2.5rem] shadow-sm flex items-center justify-center mx-auto mb-6 border border-slate-100">
                                            <Trophy size={40} className="text-slate-200"/>
                                        </div>
                                        <p className="text-slate-400 font-bold italic tracking-tight">Geen wedstryde vir {activeSonData.name} nie...</p>
                                    </div>
                                ) : (
                                    <>
                                        <div className="grid grid-cols-2 gap-5">
                                            <StatCard label="Punte" value={stats.sonPoints} sub={`${stats.sonTries} Drieë`} icon={<Target size={20}/>} color={activeSonData.color} highlight />
                                            <StatCard label="Wenpersentasie" value={`${stats.winRate}%`} sub={`${stats.wins} Wenne`} icon={<TrendingUp size={20}/>} />
                                            <StatCard label="Skoppers%" value={`${stats.overallRate}%`} sub="Akkuraatheid" icon={<ShieldCheck size={20}/>} />
                                            <StatCard label="Rekord" value={`${stats.wins}-${stats.draws}-${stats.losses}`} sub="W-G-V" icon={<Trophy size={20}/>} />
                                        </div>

                                        <div className="premium-card p-8 rounded-[2.5rem] relative overflow-hidden bg-white">
                                            <div className="absolute top-0 right-0 w-48 h-48 bg-slate-50 rounded-full -mr-24 -mt-24 blur-3xl opacity-50"></div>
                                            <div className="flex justify-between items-center mb-8 relative z-10">
                                                <h3 className="text-[11px] font-black text-slate-400 uppercase tracking-[0.3em]">Speler Ranglys</h3>
                                                <Users size={18} className="text-slate-200" />
                                            </div>
                                            <div className="space-y-4 relative z-10">
                                                {stats.leaderboard.slice(0, 5).map((s, i) => (
                                                    <div key={s.name} className={`flex items-center justify-between p-5 rounded-[1.5rem] transition-all ${s.name === activeSonData.name ? 'bg-slate-900 text-white shadow-2xl scale-[1.03]' : 'bg-slate-50'}`}>
                                                        <div className="flex items-center gap-4">
                                                            <span className={`w-8 h-8 rounded-full flex items-center justify-center text-[10px] font-black ${s.name === activeSonData.name ? 'bg-white/20 text-white' : 'bg-white text-slate-300 border border-slate-100'}`}>{i + 1}</span>
                                                            <span className="font-bold text-sm tracking-tight">{s.name}</span>
                                                        </div>
                                                        <span className="font-black text-sm tracking-tight">{s.points} <span className="text-[10px] opacity-40 uppercase ml-1 tracking-widest">pts</span></span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </>
                                )}
                            </div>
                        ) : view === 'history' ? (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center px-2">
                                    <h2 className="text-2xl font-black italic tracking-tighter text-slate-800">Wedstryd Log</h2>
                                    <span className="text-[10px] font-black text-slate-300 uppercase tracking-widest bg-white px-3 py-1 rounded-full border border-slate-100">{filteredMatches.length} Wedstryde</span>
                                </div>
                                {filteredMatches.length === 0 ? (
                                    <p className="text-center py-20 text-slate-300 italic">Nog geen geskiedenis nie.</p>
                                ) : (
                                    filteredMatches.map(m => (
                                        <div key={m.id} className="premium-card p-6 rounded-[2.25rem] flex items-center justify-between group hover:shadow-lg transition-all border border-white">
                                            <div className="flex items-center gap-5">
                                                <div className={`w-14 h-14 rounded-2xl flex flex-col items-center justify-center font-black ${m.scoreUs > m.scoreThem ? 'bg-emerald-50 text-emerald-600' : m.scoreUs === m.scoreThem ? 'bg-slate-100 text-slate-400' : 'bg-red-50 text-red-600'}`}>
                                                    <span className="text-[8px] uppercase font-black leading-none mb-1 tracking-tighter">{m.scoreUs > m.scoreThem ? 'Wen' : m.scoreUs === m.scoreThem ? 'Gelyk' : 'Verloor'}</span>
                                                    <span className="text-xl leading-none">{m.scoreUs > m.scoreThem ? 'W' : m.scoreUs === m.scoreThem ? 'G' : 'V'}</span>
                                                </div>
                                                <div>
                                                    <h4 className="font-black text-slate-900 text-lg leading-tight mb-1">vs {m.opponent}</h4>
                                                    <p className="text-[10px] text-slate-400 font-bold uppercase tracking-[0.1em]">{new Date(m.date).toLocaleDateString('en-GB')}</p>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-6">
                                                <p className="text-3xl font-black tracking-tighter text-slate-900">{m.scoreUs} - {m.scoreThem}</p>
                                                <div className="flex gap-2">
                                                    <button onClick={() => { setEditingMatch(m); setView('add'); }} className="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-50 text-slate-300 hover:text-slate-900 transition-all shadow-sm"><Pencil size={18}/></button>
                                                    <button onClick={() => handleDelete(m.id)} className="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-50 text-slate-100 hover:text-red-500 transition-all shadow-sm"><Trash2 size={18}/></button>
                                                </div>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        ) : (
                            <AddForm initialData={editingMatch} onSave={handleSave} onCancel={() => setView('dashboard')} color={activeSonData.color} sonName={activeSonData.name} />
                        )}
                    </main>

                    {/* Pro Glass Navigation */}
                    <nav className="fixed bottom-8 left-8 right-8 h-20 glass-nav rounded-[2.5rem] shadow-[0_25px_50px_-12px_rgba(0,0,0,0.15)] flex justify-around items-center z-50 px-8 border border-white/50">
                        <button onClick={() => setView('dashboard')} className={`flex flex-col items-center gap-1.5 transition-all ${view === 'dashboard' ? 'text-slate-900 scale-110' : 'text-slate-300'}`}>
                            <LayoutDashboard size={24} strokeWidth={view === 'dashboard' ? 3 : 2} />
                            <span className="text-[9px] font-black uppercase tracking-widest">Stats</span>
                        </button>
                        
                        <button onClick={() => { setEditingMatch(null); setView('add'); }} 
                                className="w-16 h-16 -mt-16 bg-slate-900 text-white rounded-[1.75rem] shadow-2xl flex items-center justify-center transform transition-all active:scale-90 hover:scale-110 hover:rotate-90">
                            <Plus size={36} strokeWidth={3} />
                        </button>

                        <button onClick={() => setView('history')} className={`flex flex-col items-center gap-1.5 transition-all ${view === 'history' ? 'text-slate-900 scale-110' : 'text-slate-300'}`}>
                            <History size={24} strokeWidth={view === 'history' ? 3 : 2} />
                            <span className="text-[9px] font-black uppercase tracking-widest">Logs</span>
                        </button>
                    </nav>
                </div>
            );
        }

        function StatCard({ label, value, sub, icon, highlight, color }) {
            return (
                <div className={`p-7 rounded-[2.5rem] transition-all transform active:scale-95 ${highlight ? 'text-white' : 'bg-white border border-white shadow-sm'}`}
                     style={highlight ? { backgroundColor: '#0f172a', boxShadow: `0 20px 40px -8px ${color}33` } : {}}>
                    <div className="flex justify-between items-start mb-6">
                        <div className={`p-2.5 rounded-xl ${highlight ? 'bg-white/10 text-white' : 'bg-slate-50 text-slate-400'}`}>{icon}</div>
                        <span className={`text-[10px] font-black uppercase tracking-[0.2em] ${highlight ? 'text-white/40' : 'text-slate-300'}`}>{label}</span>
                    </div>
                    <p className="text-4xl font-black leading-none tracking-tighter mb-1.5">{value}</p>
                    <p className={`text-[10px] font-bold uppercase tracking-wide ${highlight ? 'text-white/60' : 'text-slate-400'}`}>{sub}</p>
                </div>
            );
        }

        function AddForm({ initialData, onSave, onCancel, color, sonName }) {
            const [f, setF] = useState(initialData || { date: new Date().toISOString().split('T')[0], opponent: '', scoreUs: 0, scoreThem: 0, sonTries: 0, sonConvAtt: 0, sonConvSucc: 0, sonPenAtt: 0, sonPenSucc: 0, otherScorers: [] });
            const [os, setOs] = useState({ name: '', tries: 0, convs: 0, pens: 0 });

            return (
                <div className="bg-white rounded-[3rem] shadow-2xl p-8 sm:p-10 space-y-10 animate-in overflow-hidden border border-slate-50 mb-10">
                    <div className="flex justify-between items-center">
                        <h2 className="text-3xl font-black italic tracking-tighter text-slate-800">{initialData ? 'Dateer Wedstryd' : 'Nuwe Verslag'}</h2>
                        <button onClick={onCancel} className="bg-slate-50 p-2.5 rounded-full text-slate-300 hover:text-red-500 transition-colors"><XCircle size={30}/></button>
                    </div>
                    
                    <div className="space-y-6">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <div className="space-y-2">
                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Teenstander Skool</label>
                                <input required placeholder="Bv. Affies / Tigers" className="w-full bg-slate-50 rounded-2xl p-5 font-bold outline-none border-2 border-slate-50 focus:border-slate-100 transition-all text-lg shadow-inner" value={f.opponent} onChange={e => setF({...f, opponent: e.target.value})} />
                            </div>
                            <div className="space-y-2">
                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Wedstryd Datum</label>
                                <input type="date" className="w-full bg-slate-50 rounded-2xl p-5 font-bold outline-none border-2 border-slate-50 shadow-inner" value={f.date} onChange={e => setF({...f, date: e.target.value})} />
                            </div>
                        </div>
                        
                        <div className="grid grid-cols-2 gap-6 p-8 sm:p-10 bg-slate-900 rounded-[2.75rem] shadow-2xl relative">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-white/5 rounded-full -mr-16 -mt-16 blur-3xl"></div>
                            <div className="text-center relative z-10">
                                <label className="text-[10px] font-black text-white/40 uppercase mb-3 block tracking-widest leading-none">Ons Span</label>
                                <input type="number" className="w-full bg-transparent text-white text-center text-5xl font-black outline-none border-none tracking-tighter" value={f.scoreUs} onChange={e => setF({...f, scoreUs: parseInt(e.target.value)||0})} />
                            </div>
                            <div className="text-center relative z-10">
                                <label className="text-[10px] font-black text-white/40 uppercase mb-3 block tracking-widest leading-none">Teenstander</label>
                                <input type="number" className="w-full bg-transparent text-white/30 text-center text-5xl font-black outline-none border-none tracking-tighter" value={f.scoreThem} onChange={e => setF({...f, scoreThem: parseInt(e.target.value)||0})} />
                            </div>
                        </div>

                        <div className="p-8 bg-slate-50 rounded-[2.5rem] space-y-6 border border-slate-100">
                            <div className="flex items-center gap-3">
                                <div className="w-2 h-2 rounded-full" style={{ backgroundColor: color }}></div>
                                <h3 className="text-[11px] font-black text-slate-900 uppercase tracking-[0.2em]">{sonName} se Bydrae</h3>
                            </div>
                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                <div className="bg-white p-5 rounded-[1.75rem] text-center shadow-sm border border-slate-50">
                                    <label className="text-[9px] font-black text-slate-400 block mb-2 uppercase">Drieë</label>
                                    <input type="number" className="w-full bg-transparent p-2 text-center font-black text-3xl outline-none" value={f.sonTries} onChange={e => setF({...f, sonTries: parseInt(e.target.value)||0})} />
                                </div>
                                <div className="bg-white p-5 rounded-[1.75rem] text-center col-span-1 sm:col-span-2 shadow-sm border border-slate-50">
                                    <label className="text-[9px] font-black text-slate-400 block mb-2 uppercase">Skoppe (Slaag / Pogings)</label>
                                    <div className="flex items-center gap-3 justify-center">
                                        <input type="number" className="w-16 p-2 text-center font-black text-3xl outline-none" value={f.sonConvSucc} onChange={e => setF({...f, sonConvSucc: parseInt(e.target.value)||0})} />
                                        <span className="text-slate-200 text-3xl font-light">/</span>
                                        <input type="number" className="w-16 p-2 text-center font-black text-3xl outline-none" value={f.sonConvAtt} onChange={e => setF({...f, sonConvAtt: parseInt(e.target.value)||0})} />
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="p-8 bg-slate-50 rounded-[2.5rem] space-y-6 border border-slate-100">
                            <h3 className="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em]">Ander Puntemakers</h3>
                            <div className="flex flex-col sm:flex-row gap-4 items-end bg-white p-6 rounded-[2rem] shadow-sm">
                                <div className="w-full sm:flex-1 space-y-2">
                                    <label className="text-[9px] font-black text-slate-400 ml-1 uppercase tracking-widest">Speler Naam</label>
                                    <input className="w-full bg-slate-50 rounded-xl p-4 font-bold outline-none shadow-inner" value={os.name} onChange={e => setOs({...os, name: e.target.value})} placeholder="Bv. Janse" />
                                </div>
                                <div className="w-full sm:w-20 space-y-2">
                                    <label className="text-[9px] font-black text-slate-400 block text-center uppercase tracking-widest">Drieë</label>
                                    <input type="number" className="w-full bg-slate-50 rounded-xl p-4 font-bold text-center outline-none shadow-inner" value={os.tries} onChange={e => setOs({...os, tries: parseInt(e.target.value)||0})} />
                                </div>
                                <button type="button" onClick={() => { if(os.name) { setF({...f, otherScorers: [...f.otherScorers, {...os, id: Date.now()}]}); setOs({name:'', tries:0, convs:0, pens:0}); }}} className="w-full sm:w-auto bg-slate-900 text-white p-4 rounded-2xl shadow-xl hover:scale-105 active:scale-95 transition-all">
                                    <Plus size={24} strokeWidth={3}/>
                                </button>
                            </div>
                            <div className="flex flex-wrap gap-3">
                                {f.otherScorers.map(s => (
                                    <div key={s.id} className="flex items-center gap-3 bg-white border border-slate-200 py-3 pl-5 pr-3 rounded-2xl shadow-sm">
                                        <span className="text-sm font-bold text-slate-700">{s.name} ({s.tries})</span>
                                        <button onClick={() => setF({...f, otherScorers: f.otherScorers.filter(x => x.id !== s.id)})} className="text-slate-200 hover:text-red-500 transition-colors">
                                            <XCircle size={20}/>
                                        </button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    <button onClick={() => onSave(f)} className="w-full py-6 rounded-[2rem] text-white font-black text-2xl shadow-[0_20px_40px_-10px_rgba(0,0,0,0.3)] hover:brightness-110 active:scale-95 transition-all" style={{ backgroundColor: color }}>
                        {initialData ? 'Stoor Veranderinge' : 'Bevestig Verslag'}
                    </button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 200);
    </script>
</body>
</html>
